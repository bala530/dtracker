openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Bug Tracker API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: defects
    description: Defect management operations
  - name: projects
    description: Project management operations
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /defects:
    get:
      operationId: listDefects
      tags: [defects]
      summary: List all defects
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [reported, ready_to_retest, closed]
          required: false
        - in: query
          name: environment
          schema:
            type: string
          required: false
      responses:
        "200":
          description: List of defects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Defect"
    post:
      operationId: createDefect
      tags: [defects]
      summary: Create a new defect
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDefectBody"
      responses:
        "201":
          description: Defect created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Defect"

  /defects/{id}:
    get:
      operationId: getDefect
      tags: [defects]
      summary: Get a single defect
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Defect found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Defect"
        "404":
          description: Not found
    patch:
      operationId: updateDefect
      tags: [defects]
      summary: Update a defect
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDefectBody"
      responses:
        "200":
          description: Defect updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Defect"
    delete:
      operationId: deleteDefect
      tags: [defects]
      summary: Delete a defect
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /defects/{id}/comments:
    get:
      operationId: listComments
      tags: [defects]
      summary: List comments for a defect
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
    post:
      operationId: addComment
      tags: [defects]
      summary: Add a comment to a defect
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCommentBody"
      responses:
        "201":
          description: Comment added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /defects/{id}/attachments:
    get:
      operationId: listAttachments
      tags: [defects]
      summary: List attachments for a defect
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of attachments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Attachment"
    post:
      operationId: addAttachment
      tags: [defects]
      summary: Add an attachment URL to a defect
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddAttachmentBody"
      responses:
        "201":
          description: Attachment added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attachment"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectBody"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"

  /defects/stats/summary:
    get:
      operationId: getDefectStats
      tags: [defects]
      summary: Get summary statistics for defects
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefectStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        isDefault:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - isDefault
        - createdAt

    CreateProjectBody:
      type: object
      properties:
        name:
          type: string
        isDefault:
          type: boolean
      required:
        - name

    UpdateProjectBody:
      type: object
      properties:
        name:
          type: string
        isDefault:
          type: boolean

    Defect:
      type: object
      properties:
        id:
          type: integer
        defectId:
          type: string
          description: Human-readable defect ID like DEF-001
        description:
          type: string
        status:
          type: string
          enum: [reported, ready_to_retest, closed]
        environment:
          type: string
        projectId:
          type: integer
          nullable: true
        projectName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - defectId
        - description
        - status
        - environment
        - createdAt
        - updatedAt

    CreateDefectBody:
      type: object
      properties:
        description:
          type: string
        status:
          type: string
          enum: [reported, ready_to_retest, closed]
        environment:
          type: string
        projectId:
          type: integer
      required:
        - description
        - status
        - environment
        - projectId

    UpdateDefectBody:
      type: object
      properties:
        description:
          type: string
        status:
          type: string
          enum: [reported, ready_to_retest, closed]
        environment:
          type: string
        projectId:
          type: integer

    Comment:
      type: object
      properties:
        id:
          type: integer
        defectId:
          type: integer
        text:
          type: string
        author:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - defectId
        - text
        - author
        - createdAt

    AddCommentBody:
      type: object
      properties:
        text:
          type: string
        author:
          type: string
      required:
        - text
        - author

    Attachment:
      type: object
      properties:
        id:
          type: integer
        defectId:
          type: integer
        fileName:
          type: string
        fileUrl:
          type: string
        fileSize:
          type: integer
        mimeType:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - defectId
        - fileName
        - fileUrl
        - createdAt

    AddAttachmentBody:
      type: object
      properties:
        fileName:
          type: string
        fileUrl:
          type: string
        fileSize:
          type: integer
        mimeType:
          type: string
      required:
        - fileName
        - fileUrl

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string

    DefectStats:
      type: object
      properties:
        total:
          type: integer
        reported:
          type: integer
        readyToRetest:
          type: integer
        closed:
          type: integer
      required:
        - total
        - reported
        - readyToRetest
        - closed
